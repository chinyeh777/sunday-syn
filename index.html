<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Sync | 主日學排班系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="app" class="max-w-3xl mx-auto p-4 mt-4 md:mt-8">
        <div class="text-center mt-20">
            <div class="loader"></div> <span class="text-lg text-gray-600">系統連線中，請稍候...</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 系統設定與 API 網址 (你的專屬金鑰)
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzpZM0nl7DV2z6jZ0Y1YkLcK4l682jjubT0ilQFR0IeXbCgRYpTIw-FELU53lgUBqAF-Q/exec";
        const teachers = ["佳親", "聚芳", "玉雯", "明勝", "和進", "麗萍", "亞萍"];
        
        // 全域變數，用來暫存從雲端抓下來的資料
        let dbData = { quarters: {} }; 
        const appDiv = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        
        const view = urlParams.get('view') || 'dashboard'; // 預設視角為季度大廳
        const currentQuarterId = urlParams.get('q');
        const currentTeacher = urlParams.get('teacher');

        // ==========================================
        // 2. 資料庫讀寫功能 (與 Google Sheets 溝通)
        // ==========================================
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const text = await response.text();
                if(text && text !== "{}") {
                    dbData = JSON.parse(text);
                }
                if(!dbData.quarters) dbData.quarters = {};
                route(); // 資料載入完畢，開始渲染畫面
            } catch (error) {
                appDiv.innerHTML = `<div class="text-red-500 p-4 bg-red-100 rounded">資料載入失敗，請確認網路連線。</div>`;
            }
        }

        async function saveData(loadingMsg = "資料儲存中...") {
            const btn = document.activeElement;
            const originalText = btn.innerHTML;
            if(btn.tagName === 'BUTTON') btn.innerHTML = `<div class="loader"></div> ${loadingMsg}`;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(dbData),
                    // mode: 'no-cors' // 在某些情況下 GAS 需要加這個，但我們設定所有人可存取通常不用
                });
                if(btn.tagName === 'BUTTON') btn.innerHTML = "✅ 儲存成功";
                setTimeout(() => { if(btn.tagName === 'BUTTON') btn.innerHTML = originalText; }, 1500);
                return true;
            } catch (error) {
                alert("儲存失敗！請稍後再試。");
                if(btn.tagName === 'BUTTON') btn.innerHTML = originalText;
                return false;
            }
        }

        // ==========================================
        // 3. 路由控制 (決定顯示哪個畫面)
        // ==========================================
        function route() {
            if (currentTeacher && currentQuarterId) {
                renderTeacherView();
            } else if (view === 'create_quarter') {
                renderCreateQuarter();
            } else if (view === 'admin_quarter' && currentQuarterId) {
                renderAdminQuarter();
            } else {
                renderDashboard();
            }
        }

        // ==========================================
        // 4. 畫面 A：第一層 - 季度大廳 (Dashboard)
        // ==========================================
        function renderDashboard() {
            let html = `
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-600">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">📅 Sunday Sync 季度大廳</h1>
                        <a href="?view=create_quarter" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm">
                            ＋ 新增季排程
                        </a>
                    </div>
                    
                    <div class="space-y-4">
            `;
            
            const qKeys = Object.keys(dbData.quarters).sort().reverse();
            
            if (qKeys.length === 0) {
                html += `<div class="text-center py-8 text-gray-400 bg-gray-50 rounded-lg border border-dashed">目前沒有排程資料，請點擊右上方新增。</div>`;
            } else {
                qKeys.forEach(key => {
                    const q = dbData.quarters[key];
                    html += `
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 rounded-lg border hover:shadow-md transition">
                            <div>
                                <h2 class="text-lg font-bold text-gray-800">${q.name}</h2>
                                <p class="text-sm text-gray-500">共 ${q.activeDates.length} 週需排課</p>
                            </div>
                            <a href="?view=admin_quarter&q=${key}" class="mt-3 sm:mt-0 bg-white border border-gray-300 text-gray-700 hover:bg-gray-100 px-4 py-2 rounded font-medium transition">
                                進入管理 ➔
                            </a>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            appDiv.innerHTML = html;
        }

        // ==========================================
        // 5. 畫面 B：新增季度與排除假日
        // ==========================================
        function renderCreateQuarter() {
            appDiv.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-600">
                    <div class="flex items-center mb-6">
                        <a href="?" class="text-gray-500 hover:text-indigo-600 mr-4 text-xl">⬅️</a>
                        <h1 class="text-2xl font-bold">新增季排程</h1>
                    </div>
                    
                    <div class="mb-4 grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">年份</label>
                            <select id="yearSelect" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" onchange="generateSundays()">
                                <option value="2025">2025</option>
                                <option value="2026" selected>2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">季度</label>
                            <select id="quarterSelect" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" onchange="generateSundays()">
                                <option value="1">第一季 (1-3月)</option>
                                <option value="2">第二季 (4-6月)</option>
                                <option value="3">第三季 (7-9月)</option>
                                <option value="4">第四季 (10-12月)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-6">
                        <h3 class="font-bold text-gray-800 mb-2 border-b pb-2">請取消勾選「不排課」的日期 (如連假、特別聚會)：</h3>
                        <div id="sundaysList" class="grid grid-cols-2 sm:grid-cols-3 gap-3 bg-gray-50 p-4 rounded-lg border">
                            </div>
                    </div>

                    <button onclick="saveNewQuarter()" class="mt-8 w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                        建立季度並開始排班
                    </button>
                </div>
            `;
            generateSundays(); // 初始化跑一次
        }

        function generateSundays() {
            const year = parseInt(document.getElementById('yearSelect').value);
            const q = parseInt(document.getElementById('quarterSelect').value);
            const listDiv = document.getElementById('sundaysList');
            
            const startMonth = (q - 1) * 3; // 0-based
            let d = new Date(year, startMonth, 1);
            let sundays = [];

            // 找星期日
            while (d.getMonth() < startMonth + 3) {
                if (d.getDay() === 0) {
                    sundays.push(`${d.getMonth() + 1}/${d.getDate()}`);
                }
                d.setDate(d.getDate() + 1);
            }

            let html = '';
            sundays.forEach(date => {
                html += `
                    <label class="flex items-center p-2 bg-white border rounded shadow-sm cursor-pointer hover:bg-indigo-50">
                        <input type="checkbox" value="${date}" class="w-4 h-4 text-indigo-600 rounded mr-2" checked>
                        <span>${date} (日)</span>
                    </label>
                `;
            });
            listDiv.innerHTML = html;
        }

        async function saveNewQuarter() {
            const year = document.getElementById('yearSelect').value;
            const q = document.getElementById('quarterSelect').value;
            const qId = `${year}-Q${q}`;
            const qName = `${year}年 第${q}季`;
            
            const checkedBoxes = document.querySelectorAll('#sundaysList input[type="checkbox"]:checked');
            const activeDates = Array.from(checkedBoxes).map(cb => cb.value);

            if(activeDates.length === 0) return alert("請至少保留一天需要排課的日子！");

            // 初始化這季的資料結構
            dbData.quarters[qId] = {
                name: qName,
                activeDates: activeDates,
                unavailabilities: {},
                scheduleHTML: "" // 存排班結果
            };

            const success = await saveData("建立中...");
            if(success) window.location.href = `?view=admin_quarter&q=${qId}`;
        }

        // ==========================================
        // 6. 畫面 C：第二層 - 季度工作台 (管理員)
        // ==========================================
        function renderAdminQuarter() {
            const qData = dbData.quarters[currentQuarterId];
            if(!qData) return alert("找不到此季度的資料！");

            let html = `
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-600">
                    <div class="flex items-center mb-6 justify-between border-b pb-4">
                        <div class="flex items-center">
                            <a href="?" class="text-gray-500 hover:text-indigo-600 mr-4 text-xl">⬅️</a>
                            <h1 class="text-2xl font-bold">${qData.name} <span class="text-sm font-normal text-gray-500 ml-2">工作台</span></h1>
                        </div>
                    </div>
                    
                    <div class="mb-8">
                        <h2 class="text-lg font-semibold mb-3 flex items-center">📝 1. 發送意願調查連結</h2>
                        <ul class="space-y-2">
            `;

            teachers.forEach(teacher => {
                const hasFilled = qData.unavailabilities[teacher] ? `<span class="text-green-600 text-sm font-bold bg-green-100 px-2 py-1 rounded">✅ 已填寫</span>` : `<span class="text-red-500 text-sm font-bold bg-red-100 px-2 py-1 rounded">⏳ 未填寫</span>`;
                // 產生這季的專屬連結
                const link = `${window.location.origin}${window.location.pathname}?q=${currentQuarterId}&teacher=${teacher}`;
                html += `
                    <li class="flex flex-col sm:flex-row sm:justify-between sm:items-center bg-gray-50 p-3 rounded-lg border">
                        <div class="mb-2 sm:mb-0 flex justify-between w-full sm:w-auto pr-4">
                            <span class="font-bold w-16 inline-block">${teacher}</span> 
                            ${hasFilled}
                        </div>
                        <button onclick="copyToClipboard('${link}')" class="text-sm bg-white border shadow-sm hover:bg-gray-100 text-gray-700 py-1.5 px-3 rounded transition flex-shrink-0">
                            📋 複製專屬連結
                        </button>
                    </li>
                `;
            });

            html += `
                        </ul>
                    </div>
                    
                    <div>
                        <h2 class="text-lg font-semibold mb-3 flex items-center">🤖 2. 自動運算班表</h2>
                        <button onclick="generateSchedule()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md">
                            🚀 立即產生課表草稿
                        </button>
                    </div>
                    
                    <div id="scheduleResult" class="mt-8 ${qData.scheduleHTML ? '' : 'hidden'}">
                        ${qData.scheduleHTML || ''}
                    </div>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("已複製！請貼到 LINE 傳給老師。");
            });
        }

        // ==========================================
        // 7. 畫面 D：老師手機端填寫頁面
        // ==========================================
        function renderTeacherView() {
            const qData = dbData.quarters[currentQuarterId];
            if(!qData) return appDiv.innerHTML = "找不到此季度的調查表。";

            let html = `
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                    <h1 class="text-2xl font-bold mb-1">您好，${currentTeacher} 老師！</h1>
                    <p class="text-gray-500 mb-6 font-medium">${qData.name} 意願調查</p>
                    
                    <div class="bg-blue-50 text-blue-800 p-3 rounded-lg mb-6 text-sm">
                        ⚠️ 請勾選下方您 <span class="font-bold text-red-500">無法</span> 參與服事的日期。若皆可排班，請直接滑到最下方按送出即可。
                    </div>
                    
                    <form id="teacherForm">
                        <div class="grid grid-cols-2 gap-3 mb-6">
            `;
            
            let teacherUnavail = qData.unavailabilities[currentTeacher] || [];

            qData.activeDates.forEach(date => {
                const isChecked = teacherUnavail.includes(date) ? "checked" : "";
                html += `
                    <label class="flex items-center p-3 border rounded-lg hover:bg-gray-50 cursor-pointer transition ${isChecked ? 'bg-red-50 border-red-200' : 'bg-white'}">
                        <input type="checkbox" name="dates" value="${date}" class="w-5 h-5 text-red-500 rounded border-gray-300 focus:ring-red-500" ${isChecked}>
                        <span class="ml-3 text-lg font-medium">${date} (日)</span>
                    </label>
                `;
            });

            html += `
                        </div>
                        <button type="button" onclick="submitAvailability()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg text-lg">
                            ✅ 確認並送出
                        </button>
                    </form>
                </div>
            `;
            appDiv.innerHTML = html;
        }

        async function submitAvailability() {
            const checkboxes = document.querySelectorAll('input[name="dates"]:checked');
            const selectedDates = Array.from(checkboxes).map(cb => cb.value);
            
            // 更新本季這位老師的資料
            dbData.quarters[currentQuarterId].unavailabilities[currentTeacher] = selectedDates;
            
            const success = await saveData("資料送出中...");
            if(success) {
                appDiv.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow-md text-center border-t-4 border-green-500 mt-10">
                        <div class="text-5xl mb-4">🙌</div>
                        <h1 class="text-2xl font-bold text-green-700 mb-2">送出成功！</h1>
                        <p class="text-gray-600">感謝 ${currentTeacher} 老師的填寫與服事。<br>您可以直接關閉此網頁了。</p>
                    </div>
                `;
            }
        }

        // ==========================================
        // 8. 核心排班演算法 (保存結果到資料庫)
        // ==========================================
        async function generateSchedule() {
            const qData = dbData.quarters[currentQuarterId];
            
            let teacherStats = {};
            teachers.forEach(t => teacherStats[t] = { count: 0, lastDateIndex: -2 });

            let scheduleHTML = `
                <div class="flex justify-between items-center mb-4 border-t pt-6">
                    <h3 class="text-xl font-bold text-gray-800">📋 本季排班草稿</h3>
                    <button onclick="copyTableForExcel()" class="text-sm bg-green-600 hover:bg-green-700 text-white py-1.5 px-3 rounded transition">
                        📊 複製表格 (貼上Excel)
                    </button>
                </div>
                <div class="overflow-x-auto">
                <table id="scheduleTable" class="w-full text-left border-collapse min-w-[300px]">
                    <thead>
                        <tr class="bg-gray-800 text-white">
                            <th class="p-3 border border-gray-700 rounded-tl-lg">日期</th>
                            <th class="p-3 border border-gray-700">主教</th>
                            <th class="p-3 border border-gray-700 rounded-tr-lg">助教</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            qData.activeDates.forEach((date, dateIndex) => {
                let availableTeachers = teachers.filter(t => {
                    const unavail = qData.unavailabilities[t] || [];
                    if (unavail.includes(date)) return false; 
                    if (teacherStats[t].lastDateIndex === dateIndex - 1) return false; 
                    if (teacherStats[t].count >= 3) return false; 
                    return true;
                });

                availableTeachers = availableTeachers.sort(() => Math.random() - 0.5);

                let mainTeacher = "⚠️ 留空";
                let assistantTeacher = "⚠️ 留空";

                if (availableTeachers.length > 0) {
                    mainTeacher = availableTeachers.shift();
                    teacherStats[mainTeacher].count++;
                    teacherStats[mainTeacher].lastDateIndex = dateIndex;
                }
                
                if (availableTeachers.length > 0) {
                    assistantTeacher = availableTeachers.shift();
                    teacherStats[assistantTeacher].count++;
                    teacherStats[assistantTeacher].lastDateIndex = dateIndex;
                }

                scheduleHTML += `
                    <tr class="hover:bg-indigo-50 transition border-b">
                        <td class="p-3 border-x font-bold text-gray-700">${date}</td>
                        <td class="p-3 border-x ${mainTeacher.includes('⚠️') ? 'text-red-500 font-bold bg-red-50' : 'text-blue-700'}">${mainTeacher}</td>
                        <td class="p-3 border-x ${assistantTeacher.includes('⚠️') ? 'text-red-500 font-bold bg-red-50' : 'text-green-700'}">${assistantTeacher}</td>
                    </tr>
                `;
            });

            scheduleHTML += `</tbody></table></div>`;
            
            // 將生成的 HTML 存回資料庫
            qData.scheduleHTML = scheduleHTML;
            const success = await saveData("運算與儲存中...");
            if(success) {
                const resultDiv = document.getElementById('scheduleResult');
                resultDiv.innerHTML = scheduleHTML;
                resultDiv.classList.remove('hidden');
            }
        }

        // 方便貼上 Excel 的小功能
        function copyTableForExcel() {
            const table = document.getElementById('scheduleTable');
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            alert('表格已複製！打開 Excel (或 Google Sheets) 按下 Ctrl+V 貼上即可。');
        }

        // 啟動程式：一進網頁就去雲端抓資料
        window.onload = loadData;

    </script>
</body>
</html>
